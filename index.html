<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03060d;
  --card: rgba(8, 16, 32, 0.9);
  --border: rgba(255,255,255,0.07);
  --accent: #00c8ff;
  --white: #ffffff;
  --dim: rgba(255,255,255,0.35);
  --win: #00e676;
  --loss: #ff1744;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 24px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 6px;
  color: var(--white);
}
.logo span { color: var(--accent); }

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,23,68,0.12);
  border: 1px solid rgba(255,23,68,0.25);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--loss);
}

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--loss);
  animation: blink 1s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#clock {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--dim);
}

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── SCOREBOARD ── */
#scoreboard {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 40px;
}

.score-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
  backdrop-filter: blur(12px);
}

.score-card:hover {
  transform: translateY(-2px);
  border-color: rgba(0,200,255,0.2);
}

.score-card.live {
  border-color: rgba(255,23,68,0.3);
}

.score-card.live::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--loss), transparent);
}

.score-card.final::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, rgba(0,200,255,0.5), transparent);
}

.score-card.upcoming::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, rgba(255,255,255,0.15), transparent);
}

.score-status {
  font-size: 9px;
  letter-spacing: 2px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.score-status.live-status { color: var(--loss); }
.score-status.final-status { color: var(--dim); }
.score-status.upcoming-status { color: var(--accent); }

.status-pulse {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--loss);
  animation: blink 1s infinite;
}

.matchup {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.team-block {
  flex: 1;
  text-align: center;
}

.team-abbr {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  color: var(--white);
  line-height: 1;
}

.team-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--white);
  line-height: 1;
  margin-top: 2px;
}

.team-score.winning { color: var(--win); }
.team-score.losing  { color: var(--dim); }

.score-divider {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  color: var(--dim);
  letter-spacing: 2px;
  text-align: center;
}

.tip-time {
  font-size: 13px;
  color: var(--accent);
  margin-top: 2px;
}

/* ── TEAMS GRID ── */
#teams-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.team-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: inherit;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}

.team-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--team-color, var(--accent));
  opacity: 0;
  transition: opacity 0.2s;
}

.team-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
}

.team-card:hover::before { opacity: 1; }

.team-logo-placeholder {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: var(--team-color, rgba(0,200,255,0.15));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--white);
  flex-shrink: 0;
  opacity: 0.9;
}

.team-info { flex: 1; min-width: 0; }

.team-name {
  font-size: 11px;
  color: var(--white);
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.team-record {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-top: 2px;
}

.war-room-arrow {
  font-size: 12px;
  color: var(--dim);
  transition: color 0.2s, transform 0.2s;
}

.team-card:hover .war-room-arrow {
  color: var(--accent);
  transform: translateX(3px);
}

/* Loading state */
.loading-shimmer {
  background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
  height: 100px;
}

@keyframes shimmer { to { background-position: -200% 0; } }

.refresh-note {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-top: 8px;
}

footer {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
}

/* fade in */
.score-card, .team-card {
  animation: fadeUp 0.4s ease forwards;
  opacity: 0;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">NBA <span>COMMAND</span> CENTER</div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE SCORES</div>
      <div id="clock">--:--:-- EST</div>
    </div>
  </header>

  <!-- SCOREBOARD -->
  <div class="section-title">// TODAY'S GAMES <span id="games-count" style="font-size:11px; color:var(--dim);"></span></div>
  <div id="scoreboard"><div class="loading-shimmer"></div><div class="loading-shimmer"></div><div class="loading-shimmer"></div></div>
  <div class="refresh-note" id="refresh-note">REFRESHING EVERY 30 SECONDS</div>

  <!-- TEAMS -->
  <div class="section-title" style="margin-top:36px;">// WAR ROOMS — SELECT YOUR TEAM</div>
  <div id="teams-grid"><div class="loading-shimmer"></div></div>

  <footer>
    <span>DATA: ESPN · SPORTRADAR</span>
    <span id="last-updated">—</span>
  </footer>
</div>

<script>
const WORKER = 'https://falling-poetry-b927.humza-mir1234.workers.dev/?url=';

// All 30 NBA teams with colors and ESPN IDs
const NBA_TEAMS = [
  { id: '1',  abbr: 'ATL', name: 'Atlanta Hawks',           color: '#C8102E', espnId: 1  },
  { id: '2',  abbr: 'BOS', name: 'Boston Celtics',          color: '#007A33', espnId: 2  },
  { id: '17', abbr: 'BKN', name: 'Brooklyn Nets',           color: '#000000', espnId: 17 },
  { id: '30', abbr: 'CHA', name: 'Charlotte Hornets',       color: '#1D1160', espnId: 30 },
  { id: '4',  abbr: 'CHI', name: 'Chicago Bulls',           color: '#CE1141', espnId: 4  },
  { id: '5',  abbr: 'CLE', name: 'Cleveland Cavaliers',     color: '#860038', espnId: 5  },
  { id: '6',  abbr: 'DAL', name: 'Dallas Mavericks',        color: '#00538C', espnId: 6  },
  { id: '7',  abbr: 'DEN', name: 'Denver Nuggets',          color: '#0E2240', espnId: 7  },
  { id: '8',  abbr: 'DET', name: 'Detroit Pistons',         color: '#C8102E', espnId: 8  },
  { id: '9',  abbr: 'GSW', name: 'Golden State Warriors',   color: '#1D428A', espnId: 9  },
  { id: '10', abbr: 'HOU', name: 'Houston Rockets',         color: '#CE1141', espnId: 10 },
  { id: '11', abbr: 'IND', name: 'Indiana Pacers',          color: '#002D62', espnId: 11 },
  { id: '12', abbr: 'LAC', name: 'LA Clippers',             color: '#C8102E', espnId: 12 },
  { id: '13', abbr: 'LAL', name: 'Los Angeles Lakers',      color: '#552583', espnId: 13 },
  { id: '29', abbr: 'MEM', name: 'Memphis Grizzlies',       color: '#5D76A9', espnId: 29 },
  { id: '14', abbr: 'MIA', name: 'Miami Heat',              color: '#98002E', espnId: 14 },
  { id: '15', abbr: 'MIL', name: 'Milwaukee Bucks',         color: '#00471B', espnId: 15 },
  { id: '16', abbr: 'MIN', name: 'Minnesota Timberwolves',  color: '#0C2340', espnId: 16 },
  { id: '3',  abbr: 'NOP', name: 'New Orleans Pelicans',    color: '#0C2340', espnId: 3  },
  { id: '18', abbr: 'NYK', name: 'New York Knicks',         color: '#006BB6', espnId: 18 },
  { id: '25', abbr: 'OKC', name: 'OKC Thunder',             color: '#007AC1', espnId: 25 },
  { id: '19', abbr: 'ORL', name: 'Orlando Magic',           color: '#0077C0', espnId: 19 },
  { id: '20', abbr: 'PHI', name: 'Philadelphia 76ers',      color: '#006BB6', espnId: 20 },
  { id: '21', abbr: 'PHX', name: 'Phoenix Suns',            color: '#1D1160', espnId: 21 },
  { id: '22', abbr: 'POR', name: 'Portland Trail Blazers',  color: '#E03A3E', espnId: 22 },
  { id: '26', abbr: 'SAC', name: 'Sacramento Kings',        color: '#5A2D81', espnId: 26 },
  { id: '23', abbr: 'SAS', name: 'San Antonio Spurs',       color: '#C4CED4', espnId: 23 },
  { id: '28', abbr: 'TOR', name: 'Toronto Raptors',         color: '#CE1141', espnId: 28 },
  { id: '27', abbr: 'UTA', name: 'Utah Jazz',               color: '#002B5C', espnId: 27 },
  { id: '24', abbr: 'WAS', name: 'Washington Wizards',      color: '#002B5C', espnId: 24 },
];

// War room pages — only Mavs built so far, others show "coming soon"
const WAR_ROOMS = {
  'DAL': 'mavs-warroom/index.html',
};

// Clock
function updateClock() {
  const now = new Date();
  const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const h = String(est.getHours()).padStart(2,'0');
  const m = String(est.getMinutes()).padStart(2,'0');
  const s = String(est.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} EST`;
}
setInterval(updateClock, 1000);
updateClock();

// Format tip time
function formatTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' }) + ' ET';
}

// Fetch live scoreboard
async function fetchScores() {
  const board = document.getElementById('scoreboard');
  try {
    const url = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard';
    const res = await fetch(WORKER + encodeURIComponent(url));
    if (!res.ok) throw new Error('scores ' + res.status);
    const data = await res.json();
    const events = data.events || [];

    document.getElementById('games-count').textContent = `${events.length} GAMES`;
    document.getElementById('last-updated').textContent = 'UPDATED ' + new Date().toLocaleTimeString();

    if (!events.length) {
      board.innerHTML = '<div style="color:var(--dim); font-size:11px; letter-spacing:2px; padding:20px 0;">NO GAMES SCHEDULED TODAY</div>';
      return;
    }

    board.innerHTML = '';
    events.forEach((event, i) => {
      const comp = event.competitions[0];
      const status = comp.status.type;
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');
      const isLive = status.state === 'in';
      const isFinal = status.state === 'post';
      const isUpcoming = status.state === 'pre';

      const homeScore = parseInt(home.score || 0);
      const awayScore = parseInt(away.score || 0);

      let statusHTML = '';
      if (isLive) {
        statusHTML = `<div class="score-status live-status"><div class="status-pulse"></div>${comp.status.type.shortDetail || 'LIVE'}</div>`;
      } else if (isFinal) {
        statusHTML = `<div class="score-status final-status">FINAL</div>`;
      } else {
        statusHTML = `<div class="score-status upcoming-status">${formatTime(event.date)}</div>`;
      }

      const homeWin = isFinal && homeScore > awayScore;
      const awayWin = isFinal && awayScore > homeScore;
      const homeLeading = isLive && homeScore > awayScore;
      const awayLeading = isLive && awayScore > homeScore;

      const card = document.createElement('div');
      card.className = `score-card ${isLive ? 'live' : isFinal ? 'final' : 'upcoming'}`;
      card.style.animationDelay = (i * 0.04) + 's';

      card.innerHTML = `
        ${statusHTML}
        <div class="matchup">
          <div class="team-block">
            <div class="team-abbr">${away.team.abbreviation}</div>
            ${!isUpcoming ? `<div class="team-score ${awayWin || awayLeading ? 'winning' : isFinal || isLive ? 'losing' : ''}">${away.score || '—'}</div>` : ''}
          </div>
          <div class="score-divider">
            ${isUpcoming ? `<div style="font-size:11px;color:var(--dim);">AT</div>` : 'VS'}
          </div>
          <div class="team-block">
            <div class="team-abbr">${home.team.abbreviation}</div>
            ${!isUpcoming ? `<div class="team-score ${homeWin || homeLeading ? 'winning' : isFinal || isLive ? 'losing' : ''}">${home.score || '—'}</div>` : ''}
          </div>
        </div>`;

      board.appendChild(card);
    });

  } catch(e) {
    console.error('Scores error:', e);
    board.innerHTML = '<div style="color:var(--dim); font-size:11px; letter-spacing:2px; padding:20px 0;">SCORES UNAVAILABLE</div>';
  }
}

// Fetch standings for team records
async function fetchTeams() {
  const grid = document.getElementById('teams-grid');
  try {
    const url = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/standings';
    const res = await fetch(WORKER + encodeURIComponent(url));
    let recordMap = {};

    if (res.ok) {
      const data = await res.json();
      const children = data.children || [];
      children.forEach(conf => {
        (conf.standings?.entries || []).forEach(entry => {
          const abbr = entry.team?.abbreviation;
          const stats = entry.stats || [];
          const w = stats.find(s => s.name === 'wins')?.value || 0;
          const l = stats.find(s => s.name === 'losses')?.value || 0;
          if (abbr) recordMap[abbr] = `${w}-${l}`;
        });
      });
    }

    grid.innerHTML = '';
    NBA_TEAMS.forEach((team, i) => {
      const hasWarRoom = !!WAR_ROOMS[team.abbr];
      const href = hasWarRoom ? WAR_ROOMS[team.abbr] : '#';
      const record = recordMap[team.abbr] || '—';

      const card = document.createElement('a');
      card.href = href;
      card.className = 'team-card';
      card.style.setProperty('--team-color', team.color);
      card.style.animationDelay = (i * 0.02) + 's';
      if (!hasWarRoom) card.style.cursor = 'default';

      card.innerHTML = `
        <div class="team-logo-placeholder" style="background:${team.color}22; color:${team.color};">
          ${team.abbr}
        </div>
        <div class="team-info">
          <div class="team-name">${team.name}</div>
          <div class="team-record">${record} · ${hasWarRoom ? '<span style="color:var(--accent)">WAR ROOM ↗</span>' : '<span style="color:var(--dim)">COMING SOON</span>'}</div>
        </div>
        ${hasWarRoom ? '<div class="war-room-arrow">→</div>' : ''}
      `;

      if (!hasWarRoom) {
        card.addEventListener('click', e => e.preventDefault());
      }

      grid.appendChild(card);
    });

  } catch(e) {
    console.error('Teams error:', e);
    // Fallback - show teams without records
    grid.innerHTML = '';
    NBA_TEAMS.forEach((team, i) => {
      const hasWarRoom = !!WAR_ROOMS[team.abbr];
      const card = document.createElement('a');
      card.href = hasWarRoom ? WAR_ROOMS[team.abbr] : '#';
      card.className = 'team-card';
      card.style.setProperty('--team-color', team.color);
      card.style.animationDelay = (i * 0.02) + 's';
      card.innerHTML = `
        <div class="team-logo-placeholder" style="background:${team.color}22; color:${team.color};">${team.abbr}</div>
        <div class="team-info">
          <div class="team-name">${team.name}</div>
          <div class="team-record">${hasWarRoom ? '<span style="color:var(--accent)">WAR ROOM ↗</span>' : '<span style="color:var(--dim)">COMING SOON</span>'}</div>
        </div>
        ${hasWarRoom ? '<div class="war-room-arrow">→</div>' : ''}
      `;
      if (!hasWarRoom) card.addEventListener('click', e => e.preventDefault());
      grid.appendChild(card);
    });
  }
}

// Load everything
fetchScores();
fetchTeams();

// Refresh scores every 30 seconds
setInterval(fetchScores, 30000);
// Refresh teams every 5 minutes
setInterval(fetchTeams, 300000);
</script>
</body>
</html>
